server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Envía todas las rutas al index.html (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Evita cachear el index.html para que siempre se sirva la versión fresca
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Assets estáticos: cacheo agresivo (CRA genera hashes en los nombres)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
