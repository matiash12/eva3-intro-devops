name: CI/CD - Build & Deploy to EKS

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: eva3
  ECR_BACKEND: 821111072781.dkr.ecr.us-east-1.amazonaws.com/eva3-backend
  ECR_FRONTEND: 821111072781.dkr.ecr.us-east-1.amazonaws.com/eva3-frontend

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build y push de imágenes Docker a ECR
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generar tag de imagen (SHA corto)
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      # ── Backend ──────────────────────────────
      - name: Build imagen backend
        run: |
          docker build \
            -t $ECR_BACKEND:${{ steps.meta.outputs.tag }} \
            -t $ECR_BACKEND:latest \
            ./backend

      - name: Push imagen backend a ECR
        run: |
          docker push $ECR_BACKEND:${{ steps.meta.outputs.tag }}
          docker push $ECR_BACKEND:latest

      # ── Frontend ─────────────────────────────
      - name: Build imagen frontend
        run: |
          docker build \
            --build-arg REACT_APP_BACKEND_URL="" \
            -t $ECR_FRONTEND:${{ steps.meta.outputs.tag }} \
            -t $ECR_FRONTEND:latest \
            ./frontend

      - name: Push imagen frontend a ECR
        run: |
          docker push $ECR_FRONTEND:${{ steps.meta.outputs.tag }}
          docker push $ECR_FRONTEND:latest

  # ─────────────────────────────────────────────
  # Job 2: Deploy a EKS
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Actualizar kubeconfig para el cluster EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Aplicar manifiestos de Kubernetes
        run: kubectl apply -f k8s/

      - name: Actualizar imagen del backend en el Deployment
        run: |
          kubectl set image deployment/backend \
            backend=$ECR_BACKEND:${{ needs.build-and-push.outputs.image-tag }}

      - name: Actualizar imagen del frontend en el Deployment
        run: |
          kubectl set image deployment/frontend \
            frontend=$ECR_FRONTEND:${{ needs.build-and-push.outputs.image-tag }}

      - name: Esperar rollout del backend
        run: kubectl rollout status deployment/backend --timeout=120s

      - name: Esperar rollout del frontend
        run: kubectl rollout status deployment/frontend --timeout=120s

      - name: Mostrar estado final de los pods
        run: |
          echo "=== Pods ==="
          kubectl get pods -o wide
          echo "=== Services ==="
          kubectl get services
          echo "=== HPA ==="
          kubectl get hpa

      - name: Obtener URL pública del frontend (LoadBalancer)
        run: |
          echo "Esperando hostname del LoadBalancer (puede tardar ~2 min)..."
          for i in $(seq 1 24); do
            HOSTNAME=$(kubectl get svc frontend-svc \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            if [ -n "$HOSTNAME" ]; then
              echo ""
              echo "✅ Frontend disponible en: http://$HOSTNAME"
              exit 0
            fi
            echo "  intento $i/24 — sin hostname aún, reintentando en 5s..."
            sleep 5
          done
          echo "⚠️  El LoadBalancer aún no tiene hostname asignado."
          echo "   Ejecuta: kubectl get svc frontend-svc"
